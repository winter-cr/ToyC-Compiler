name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**
      - feature-*
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Run smoke tests
        run: bash scripts/run_smoke_tests.sh build

      - name: Upload smoke assembly
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-asm
          path: build/smoke/return_7.s

  # Phase 2: End-to-end RISC-V tests (Day 4+)
  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-smoke-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Build compiler
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Install RISC-V tools
        run: |
          sudo apt-get install -y qemu-user gcc-riscv64-linux-gnu

      - name: Dump generated assembly + manual QEMU test
        run: |
          mkdir -p build/e2e_out
          build/toyc < tests/basic/return_7.tc > build/e2e_out/return_7.s 2>&1
          cat > build/e2e_out/_start.s <<'ASM'
            .section .text.start
            .globl _start
          _start:
            call main
            li a7, 93
            ecall
          ASM
          echo "=== return_7.s ==="
          cat build/e2e_out/return_7.s
          echo "=== _start.s ==="
          cat build/e2e_out/_start.s
          echo "=== linking ==="
          riscv64-linux-gnu-gcc -march=rv32im -mabi=ilp32 -nostdlib -nostartfiles -static \
            -Wl,-e,_start -Wl,-Ttext=0x10000 \
            -o build/e2e_out/return_7.elf build/e2e_out/_start.s build/e2e_out/return_7.s 2>&1
          echo "=== ELF header ==="
          riscv64-linux-gnu-readelf -h build/e2e_out/return_7.elf 2>&1 || true
          echo "=== ELF entry point ==="
          riscv64-linux-gnu-objdump -d build/e2e_out/return_7.elf 2>&1 | head -40
          echo "=== which qemu-riscv32 ==="
          which qemu-riscv32 2>&1 || echo "NOT FOUND"
          ls /usr/bin/qemu-riscv* 2>&1 || echo "NONE"
          echo "=== run qemu ==="
          qemu-riscv32 build/e2e_out/return_7.elf 2>&1
          echo "exit code: $?"

      - name: Run end-to-end tests (normal mode)
        run: bash scripts/run_e2e_tests.sh --verbose

      - name: Run end-to-end tests (opt mode)
        run: bash scripts/run_e2e_tests.sh --opt --verbose
