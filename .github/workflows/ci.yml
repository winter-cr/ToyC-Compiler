name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**
      - feature-*
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Run smoke tests
        run: bash scripts/run_smoke_tests.sh build

      - name: Upload smoke assembly
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-asm
          path: build/smoke/return_7.s

  # Phase 2: End-to-end RISC-V tests (Day 4+)
  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-smoke-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Build compiler
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Install RISC-V tools
        run: |
          sudo apt-get install -y qemu-user gcc-riscv64-linux-gnu

      - name: Debug function_call and loop_sum
        run: |
          mkdir -p build/e2e_out
          cat > build/e2e_out/_start.s <<'ASM'
            .section .text.start
            .globl _start
          _start:
            call main
            li a7, 93
            ecall
          ASM
          echo "=== function_call.tc ==="
          build/toyc < tests/basic/function_call.tc > build/e2e_out/fn_call.s 2>&1
          cat build/e2e_out/fn_call.s
          echo "=== loop_sum.tc ==="
          build/toyc < tests/performance/loop_sum.tc > build/e2e_out/loop_sum.s 2>&1
          cat build/e2e_out/loop_sum.s
          echo "=== link & run function_call ==="
          riscv64-linux-gnu-gcc -march=rv32im -mabi=ilp32 \
            -nostdlib -nostartfiles -static \
            -Wl,-e,_start -Wl,-Ttext=0x10000 -Wl,--build-id=none \
            -o build/e2e_out/fn_call.elf build/e2e_out/_start.s build/e2e_out/fn_call.s 2>&1
          qemu-riscv32 build/e2e_out/fn_call.elf 2>&1
          echo "exit: $?" || true
          echo "=== link & run loop_sum ==="
          riscv64-linux-gnu-gcc -march=rv32im -mabi=ilp32 \
            -nostdlib -nostartfiles -static \
            -Wl,-e,_start -Wl,-Ttext=0x10000 -Wl,--build-id=none \
            -o build/e2e_out/loop_sum.elf build/e2e_out/_start.s build/e2e_out/loop_sum.s 2>&1
          qemu-riscv32 build/e2e_out/loop_sum.elf 2>&1
          echo "exit: $?" || true

      - name: Run end-to-end tests (normal mode)
        run: bash scripts/run_e2e_tests.sh --verbose

      - name: Run end-to-end tests (opt mode)
        run: bash scripts/run_e2e_tests.sh --opt --verbose
