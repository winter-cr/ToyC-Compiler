name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**
      - feature-*
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Run smoke tests
        run: bash scripts/run_smoke_tests.sh build

      - name: Upload smoke assembly
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-asm
          path: build/smoke/return_7.s
